server {
    server_name plinthmaker.thehivemind5.com;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/plinthmaker.thehivemind5.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/plinthmaker.thehivemind5.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = plinthmaker.thehivemind5.com) {
        return 301 https://$host$request_uri;
    }

    server_name plinthmaker.thehivemind5.com;
    listen 80;
    return 404;
}
